name: Deploy (infra + app)

# Manuell utløsning, slik at PR-er ikke krever Azure-secrets. Krever at OIDC-innlogging og
# variabler/secrets er satt opp i repoet (se under). «what-if» kjøres alltid; «deploy» bare
# når input «deploy» er true.
on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Kjør faktisk deploy (ellers kun what-if)'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  NAVN_PREFIKS: ${{ vars.NAVN_PREFIKS }}
  MILJO: ${{ vars.MILJO }}

jobs:
  infra:
    name: Infrastruktur (Bicep)
    runs-on: ubuntu-latest
    outputs:
      webAppNavn: ${{ steps.deploy.outputs.webAppNavn }}
    steps:
      - uses: actions/checkout@v4

      - name: Logg inn på Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              --resource-group "$RESOURCE_GROUP" \
              --template-file infra/main.bicep \
              --parameters navnPrefiks="$NAVN_PREFIKS" miljo="$MILJO" \
                sqlAdAdminLogin="${{ secrets.SQL_AD_ADMIN_LOGIN }}" \
                sqlAdAdminObjectId="${{ secrets.SQL_AD_ADMIN_OBJECT_ID }}"

      - name: Deploy
        id: deploy
        if: ${{ inputs.deploy }}
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            navn=$(az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file infra/main.bicep \
              --parameters navnPrefiks="$NAVN_PREFIKS" miljo="$MILJO" \
                sqlAdAdminLogin="${{ secrets.SQL_AD_ADMIN_LOGIN }}" \
                sqlAdAdminObjectId="${{ secrets.SQL_AD_ADMIN_OBJECT_ID }}" \
              --query "properties.outputs.webAppNavnUt.value" -o tsv)
            echo "webAppNavn=$navn" >> "$GITHUB_OUTPUT"

  app:
    name: Publiser app
    runs-on: ubuntu-latest
    needs: infra
    if: ${{ inputs.deploy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publiser
        run: dotnet publish backend/Aarshjul.Web/Aarshjul.Web.csproj -c Release -o publish

      - name: Logg inn på Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy til App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.infra.outputs.webAppNavn }}
          package: publish
